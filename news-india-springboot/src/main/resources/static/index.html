<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India News - Live Headlines</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-title">India News</div>
          <div class="brand-subtitle">Current headlines in India</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta-row">
          <span class="meta-label">Auto refresh:</span>
          <span class="meta-value" id="refreshHint">every minute</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Last updated:</span>
          <span class="meta-value" id="lastUpdated">—</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">News editor:</span>
          <span class="meta-value">Vishawanath Pratap Singhj</span>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Top Headlines</h2>
          <div class="panel-actions">
            <button class="btn" id="refreshBtn" type="button">Refresh now</button>
          </div>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>
        <div class="grid" id="newsGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="/js/app.js" defer></script>
  </body>
</html>
